  <!-- round 2  -->
  <mat-toolbar class="mat-elevation-z8">
    <button
      mat-icon-button
      *ngIf="sidenav.mode === 'over'"
      (click)="sidenav.toggle()" >
      <mat-icon *ngIf="!sidenav.opened"> menu </mat-icon>
      <mat-icon *ngIf="sidenav.opened"> close </mat-icon>
    </button>
    Welcome
  </mat-toolbar>
  <!-- fixed side nav -->

  <mat-sidenav-container>
    <mat-sidenav #sidenav="matSidenav" class="mat-elevation-z8">
     
      <h4 class="name">DashBoard</h4>
  
      <mat-divider></mat-divider>
  
      <button mat-button class="menu-button" [routerLink]="'/dashboard/dash/dashboard'">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>
      <button mat-button class="menu-button" [routerLink]="'/dashboard/dash/form'">
        <mat-icon>person</mat-icon>
        <span> Profile Add</span>
      </button>
      <button mat-button class="menu-button" [routerLink]="'/dashboard/dash/user'">
        <mat-icon>list</mat-icon>
        <span>User List</span>
      </button>
      
      <mat-divider></mat-divider>
  
      <button mat-button class="menu-button" >
        <mat-icon>help</mat-icon>
        <span>Help</span>
      </button>
    </mat-sidenav>
    <mat-sidenav-content>
      <div class="content mat-elevation-z8">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
